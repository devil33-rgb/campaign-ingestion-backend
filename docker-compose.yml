services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ads
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ads"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - shared_data:/shared   # 🔥 ADD THIS

  worker:
    build: .
    command: celery -A app.jobs.celery_app.celery worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - shared_data:/shared   # 🔥 ADD THIS

# 🔥 ADD THIS AT BOTTOM
volumes:
  shared_data: